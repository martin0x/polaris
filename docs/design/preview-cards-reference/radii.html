<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .tile { height: 72px; background: #f6f2e9; border: 1px solid #e7dfcd; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style></head><body><div class="card">
  <div class="grid">
    <div class="tile" style="border-radius:0">0</div>
    <div class="tile" style="border-radius:3px">xs · 3</div>
    <div class="tile" style="border-radius:4px">sm · 4</div>
    <div class="tile" style="border-radius:6px">md · 6</div>
    <div class="tile" style="border-radius:10px">lg · 10</div>
    <div class="tile" style="border-radius:14px">xl · 14</div>
    <div class="tile" style="border-radius:999px">full</div>
  </div>
</div></body></html>
