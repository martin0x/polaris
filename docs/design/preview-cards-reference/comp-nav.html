<!doctype html><html><head><meta charset="utf-8"><title>Nav items</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: #f6f2e9; }
  .nav { background: #f6f2e9; padding: 8px; display: flex; flex-direction: column; gap: 2px; max-width: 280px; }
  .item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 5px; font-size: 13px; color: var(--ink-2); cursor: pointer; font-family: var(--font-sans); }
  .item.hover { background: #efe9db; }
  .item.active { background: #efecff; color: #4232a8; font-weight: 500; }
  .item .count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }
  .item.active .count { color: #4232a8; }
  svg { width: 14px; height: 14px; }
</style></head><body><div class="card">
  <div class="row" style="align-items:flex-start;gap:18px">
    <div class="nav" style="flex:1">
      <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M2 10h20"/></svg>Inbox<span class="count">12</span></div>
      <div class="item hover"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="m10 14 11-11"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>Daily notes<span class="count">32</span></div>
      <div class="item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/><path d="M14 2v6h6"/></svg>Polaris<span class="count">8</span></div>
      <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10V7a2 2 0 0 0-2-2h-5L9 2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/></svg>Archive</div>
    </div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-3);padding-top:6px">default · hover · active · default</div>
  </div>
</div></body></html>
