<!doctype html><html><head><meta charset="utf-8"><title>Mono</title>
<link rel="stylesheet" href="_card.css">
<style>
  .mono-block { background:#f1ecdf; border:1px solid #e1d9c4; border-radius:6px; padding:12px 14px; font-family:var(--font-mono); font-size:12.5px; line-height:1.55; color:#2e2a23; }
  .kw { color:#7c6cf0; } .st { color:#8a5a3a; } .cm { color:#9a9281; } .fn { color:#5f74c1; }
  kbd { font-family:var(--font-mono); font-size:11px; background:#f1ecdf; border:1px solid #e1d9c4; border-radius:3px; padding:1px 6px; color:#2e2a23; box-shadow: inset 0 -1px 0 #d8cdb5; }
</style>
</head><body><div class="card" style="gap:10px">
  <div class="mono-block"><span class="cm">// capture a thought</span><br><span class="kw">function</span> <span class="fn">capture</span>(thought) {<br>&nbsp;&nbsp;<span class="kw">return</span> vault.<span class="fn">write</span>(<span class="st">"inbox.md"</span>, thought);<br>}</div>
  <div class="row">
    <kbd>⌘</kbd><kbd>K</kbd>
    <span style="color:var(--ink-3);font-size:12.5px">open palette</span>
    <kbd>⌘</kbd><kbd>N</kbd>
    <span style="color:var(--ink-3);font-size:12.5px">new note</span>
    <kbd>↵</kbd>
    <span style="color:var(--ink-3);font-size:12.5px">confirm</span>
  </div>
</div></body></html>
