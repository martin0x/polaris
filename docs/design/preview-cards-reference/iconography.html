<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>

  .ico { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; }
  .ico svg { width: 18px; height: 18px; stroke: var(--ink-2); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .ico span { font-family: var(--font-mono); font-size: 9px; color: var(--ink-4); }
</style></head><body><div class="card" style="gap:8px">

    <div class="ico"><svg viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg><span>sidebar</span></div>
