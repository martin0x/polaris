<!doctype html><html><head><meta charset="utf-8"><title>Tags & pills</title>
<link rel="stylesheet" href="_card.css">
<style>
  .tag { border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
  .t-tag { background: rgba(210,145,188,0.22); color: #8d3e6d; }
  .t-inbox { background: #efecff; color: #4232a8; }
  .t-ok { background: #e4efe7; color: #2e5340; }
  .t-warn { background: #f4ebd6; color: #6b4e1c; }
  .t-danger { background: #f2dedb; color: #7a2f25; }
  .t-mute { background: #efe9db; color: #4a4439; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style></head><body><div class="card" style="gap:10px">
  <div class="row">
    <span class="tag t-tag">#reading</span>
    <span class="tag t-tag">#inbox</span>
    <span class="tag t-tag">#project/polaris</span>
    <span class="tag t-inbox">Draft</span>
    <span class="tag t-mute">Archived</span>
  </div>
  <div class="row">
    <span class="tag t-ok"><span class="dot" style="background:#4f8a6a"></span>synced</span>
    <span class="tag t-warn"><span class="dot" style="background:#c08a3d"></span>offline</span>
    <span class="tag t-danger"><span class="dot" style="background:#b0564a"></span>conflict</span>
    <span class="tag t-mute">2 min ago</span>
  </div>
</div></body></html>
