<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field { display: flex; flex-direction: column; gap: 5px; }
  .lab { font-size: 11.5px; font-weight: 500; color: var(--ink-2); }
  .inp { font-family: var(--font-sans); font-size: 13.5px; padding: 7px 10px; background: #fbf9f4; border: 1px solid #d8cdb5; border-radius: 6px; color: var(--ink-1); }
  .inp.focus { border-color: #7c6cf0; box-shadow: 0 0 0 3px rgba(124,108,240,0.25); outline: none; }
  .inp.err { border-color: #b0564a; box-shadow: 0 0 0 3px rgba(176,86,74,0.2); }
  .help { font-size: 11px; color: var(--ink-3); }
  .err-msg { font-size: 11px; color: #b0564a; }
  .search { display: flex; align-items: center; gap: 8px; background: #f1ecdf; border: 1px solid #e1d9c4; border-radius: 6px; padding: 6px 10px; }
  .search input { border: 0; background: transparent; outline: none; font-family: var(--font-sans); font-size: 13px; flex:1; }
</style></head><body><div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
    <div class="field"><span class="lab">Title</span><input class="inp" value="Reading list"></div>
    <div class="field"><span class="lab">Tag</span><input class="inp focus" value="#inbox"></div>
    <div class="field"><span class="lab">Path</span><input class="inp err" value="/vault/"><span class="err-msg">Filename required</span></div>
  </div>
  <div class="search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b6454" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input placeholder="Search or jump to…"><kbd style="font-family:var(--font-mono);font-size:10.5px;background:#fbf9f4;border:1px solid #d8cdb5;border-radius:3px;padding:1px 5px;color:var(--ink-3)">⌘K</kbd></div>
</div></body></html>
