<!doctype html><html><head><meta charset="utf-8"><title>Command palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: rgba(29,27,23,0.4); }
  .palette { background: #fbf9f4; border: 1px solid #d8cdb5; border-radius: 10px; box-shadow: 0 20px 48px rgba(40,32,20,0.14), 0 4px 8px rgba(40,32,20,0.06); overflow: hidden; }
  .search { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #efe9db; }
  .search input { border: 0; background: transparent; outline: none; font-family: var(--font-sans); font-size: 14px; flex: 1; color: var(--ink-1); }
  .sec { padding: 6px 14px 4px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-4); }
  .row { display: flex; align-items: center; gap: 10px; padding: 6px 14px; font-size: 13px; color: var(--ink-1); }
  .row.active { background: #efecff; color: #4232a8; }
  .row .k { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }
  svg { width: 14px; height: 14px; }
</style></head><body><div class="card" style="padding:12px">
  <div class="palette">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6b6454" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input value="capt" autofocus>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-4)">esc</span>
    </div>
    <div class="sec">Actions</div>
    <div class="row active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>Capture a thought<span class="k">⌘⇧N</span></div>
    <div class="row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg>Capture to inbox<span class="k">⌘N</span></div>
    <div class="sec">Notes</div>
    <div class="row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/></svg>Captured this morning</div>
  </div>
</div></body></html>
