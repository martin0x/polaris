<!doctype html><html><head><meta charset="utf-8"><title>Paper</title>
<link rel="stylesheet" href="_card.css">
<style>
  .paper-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { height: 88px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .sw .t { font-size: 11px; font-family: var(--font-mono); font-weight: 600; color: var(--ink-1); }
  .sw .h { font-size: 10px; font-family: var(--font-mono); color: var(--ink-3); }
</style></head>
<body><div class="card">
  <div class="paper-row">
    <div class="sw" style="background:#fefcf7"><div class="t">paper-0</div><div class="h">#fefcf7</div></div>
    <div class="sw" style="background:#faf7ef"><div class="t">paper-1</div><div class="h">#faf7ef</div></div>
    <div class="sw" style="background:#f5f0e4"><div class="t">paper-2</div><div class="h">#f5f0e4</div></div>
    <div class="sw" style="background:#ece6d5"><div class="t">paper-3</div><div class="h">#ece6d5</div></div>
    <div class="sw" style="background:#dfd7c0"><div class="t">paper-4</div><div class="h">#dfd7c0</div></div>
  </div>
</div></body></html>
