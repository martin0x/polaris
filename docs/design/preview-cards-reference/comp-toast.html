<!doctype html><html><head><meta charset="utf-8"><title>Toast + banner</title>
<link rel="stylesheet" href="_card.css">
<style>
  .toast { display: flex; align-items: center; gap: 10px; background: #fbf9f4; border: 1px solid #d8cdb5; border-radius: 8px; padding: 10px 14px; box-shadow: 0 8px 24px rgba(40,32,20,0.10); font-size: 13px; color: var(--ink-1); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .banner { padding: 10px 14px; border-radius: 6px; font-size: 13px; display: flex; gap: 10px; align-items: center; }
  .banner .close { margin-left: auto; color: inherit; opacity: 0.6; cursor: pointer; }
  svg { width: 14px; height: 14px; }
</style></head><body><div class="card" style="gap:10px">
  <div class="toast"><span class="dot" style="background:#4f8a6a"></span>Saved to local vault<span style="margin-left:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-4)">⌘Z to undo</span></div>
  <div class="banner" style="background:#f4ebd6;color:#6b4e1c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>Working offline — changes saved locally.<span class="close">×</span></div>
  <div class="banner" style="background:#f2dedb;color:#7a2f25"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>Could not reach sync server. Retrying in 8s.</div>
</div></body></html>
