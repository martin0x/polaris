<!doctype html><html><head><meta charset="utf-8"><title>Ink</title>
<link rel="stylesheet" href="_card.css">
<style>
  .ink-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { height: 88px; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; color: #fbf9f4; }
  .sw.lite { color: var(--ink-0); }
  .sw .t { font-size: 11px; font-family: var(--font-mono); font-weight: 600; }
  .sw .h { font-size: 10px; font-family: var(--font-mono); opacity: 0.8; }
</style></head>
<body><div class="card">
  <div class="ink-row">
    <div class="sw" style="background:#1d1b17"><div class="t">ink-0</div><div class="h">#1d1b17</div></div>
    <div class="sw" style="background:#2e2a23"><div class="t">ink-1</div><div class="h">#2e2a23</div></div>
    <div class="sw" style="background:#4a4439"><div class="t">ink-2</div><div class="h">#4a4439</div></div>
    <div class="sw" style="background:#6b6454"><div class="t">ink-3</div><div class="h">#6b6454</div></div>
    <div class="sw lite" style="background:#9a9281"><div class="t">ink-4</div><div class="h">#9a9281</div></div>
    <div class="sw lite" style="background:#b7ae9a"><div class="t">ink-5</div><div class="h">#b7ae9a</div></div>
  </div>
</div></body></html>
