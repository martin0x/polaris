services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Uncomment when ready for containerized deployment:
  # app:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://polaris:polaris@postgres:5432/polaris
  #     REDIS_URL: redis://redis:6379
  #   depends_on:
  #     - postgres
  #     - redis

  # worker:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   command: node src/platform/jobs/start-workers.ts
  #   environment:
  #     DATABASE_URL: postgresql://polaris:polaris@postgres:5432/polaris
  #     REDIS_URL: redis://redis:6379
  #   depends_on:
  #     - postgres
  #     - redis

volumes:
  postgres_data:
  redis_data:
